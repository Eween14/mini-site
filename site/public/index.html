<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Spy Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #202225;
      color: white;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 100px;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    /* =========================
       POPUP
    ========================= */

    #createRoomModal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);

      display: none;

      justify-content: center;
      align-items: center;
    }

    .modalContent {
      position: relative;

      width: 400px;
      padding: 40px;

      background: #2f3136;
      border-radius: 10px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #roomIdInput {
      font-size: 28px;
      text-align: center;
      width: 200px;
      padding: 10px;
    }
	
	#nicknameInput {
	  font-size: 22px;
	  text-align: center;
	  width: 200px;
	  padding: 10px;
	}

    .closeButton {
      position: absolute;
      top: 10px;
      right: 15px;

      font-size: 28px;
      cursor: pointer;
    }

    #roomView {
      display: none;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- =========================
       MENU PRINCIPAL
  ========================== -->

  <div class="center" id="mainMenu">
    <button onclick="openCreateRoomModal()">
      Créer Room
    </button>

    <button>
      Rejoindre Room
    </button>
  </div>

  <!-- =========================
       POPUP CREATE ROOM
  ========================== -->

  <div id="createRoomModal">

    <div class="modalContent">

		<div class="closeButton" onclick="closeCreateRoomModal()">
		✕
		</div>

		<input id="roomIdInput" maxlength="6">

		<input
		  id="nicknameInput"
		  maxlength="16"
		  placeholder="Pseudo"
		  value="Host"
		>

		<button onclick="confirmCreateRoom()">
		  Créer
		</button>

    </div>

  </div>

  <!-- =========================
       ROOM VIEW
  ========================== -->

  <div id="roomView">

    <h1 id="roomTitle"></h1>

    <h2>Joueurs :</h2>

    <ul id="playersList"></ul>

  </div>

  <!-- =========================
       SOCKET.IO
  ========================== -->

  <script src="/socket.io/socket.io.js"></script>

  <script>

    const socket = io();

    let currentRoomId = null;

    /* =========================
       RANDOM ROOM ID
    ========================== */

    function generateRoomId() {

      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

      let result = "";

      for (let i = 0; i < 6; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
      }

      return result;
    }

    /* =========================
       OPEN MODAL
    ========================== */

    function openCreateRoomModal() {

      document.getElementById("createRoomModal").style.display = "flex";

      document.getElementById("roomIdInput").value = generateRoomId();
    }

    /* =========================
       CLOSE MODAL
    ========================== */

    function closeCreateRoomModal() {

      document.getElementById("createRoomModal").style.display = "none";
    }

    /* =========================
       CREATE ROOM
    ========================== */

    function confirmCreateRoom() {

		const roomId = document.getElementById("roomIdInput").value;

		const nickname =
		  document.getElementById("nicknameInput").value.trim() || "Host";

		currentRoomId = roomId;

		socket.emit("createRoom", {
		  roomId,
		  name: nickname,
		  password: null
		});

		closeCreateRoomModal();
    }

    /* =========================
       ROOM UPDATE
    ========================== */

    socket.on("roomUpdate", (room) => {

      document.getElementById("mainMenu").style.display = "none";

      document.getElementById("roomView").style.display = "block";

      document.getElementById("roomTitle").textContent =
        "Room : " + currentRoomId;

      const playersList = document.getElementById("playersList");

      playersList.innerHTML = "";

      room.players.forEach(player => {

        const li = document.createElement("li");

        li.textContent = player.name;

        playersList.appendChild(li);
      });

    });

  </script>

</body>

</html>
