<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>GAMEROOM</title>

  <style>

    body {
      margin: 0;
      background: #202225;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* =========================
       CENTER COLUMN
    ========================== */

    .page {
      width: 100%;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .centerColumn {
      width: 400px;

      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* =========================
       TEXT
    ========================== */

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 48px;
    }

    .roomCode {
      text-align: center;
      font-size: 40px;
      font-weight: bold;
    }

    /* =========================
       INPUTS
    ========================== */

    input {
      width: 100%;
      box-sizing: border-box;

      padding: 14px;

      font-size: 20px;

      border: none;
      border-radius: 6px;

      outline: none;
    }

    /* =========================
       BUTTONS
    ========================== */

    .buttonRow {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;

      padding: 14px;

      font-size: 18px;

      border: none;
      border-radius: 6px;

      cursor: pointer;
    }

    /* =========================
       ROOM VIEW
    ========================== */

    #roomPage {
      display: none;
    }

    #playersList {
      list-style: none;
      padding: 0;
      margin-top: 20px;

      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #playersList li {
      background: #2f3136;
      padding: 12px;
      border-radius: 6px;
    }
	
	/* =========================
	   CHAT
	========================== */

	#chatContainer {
	  margin-top: 20px;

	  display: flex;
	  flex-direction: column;
	  gap: 10px;
	}

	#chatMessages {
	  height: 220px;

	  background: #2f3136;

	  border-radius: 6px;

	  padding: 10px;

	  overflow-y: auto;

	  box-sizing: border-box;
	}

	.chatMessage {
	  margin-bottom: 8px;
	}

	#chatInputRow {
	  display: flex;
	  gap: 0;
	}

	#chatInput {
	  flex: 1;

	  border-top-right-radius: 0;
	  border-bottom-right-radius: 0;
	}

	#sendChatButton {
	  width: 60px;

	  border-top-left-radius: 0;
	  border-bottom-left-radius: 0;
	}

    /* =========================
       GAME SELECT
    ========================= */

    #gameSelect {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gameOption {
      padding: 10px;
      border-radius: 6px;
      background: #2f3136;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .gameOption.selected {
      border-color: #89fa7d;
    }

    /* =========================
       READY BUTTON
    ========================= */

    #bottomButton {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .readyOff {
      background: transparent;
      border: 2px solid #888;
      color: white;
    }

    .readyOn {
      background: #89fa7d;
      color: white;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <!-- =========================
       MAIN PAGE
  ========================== -->

  <div class="page" id="mainPage">

    <div class="centerColumn">

      <h1>GAMEROOM</h1>

      <!-- NAME -->
      <input
        id="nameInput"
        placeholder="Your name..."
        maxlength="16"
      >

      <!-- ROOM ID -->
      <div id="roomInputContainer"></div>

      <!-- BUTTONS -->
      <div class="buttonRow">

        <button id="leftButton" onclick="createLobbyMode()">
          Create lobby
        </button>

        <button id="rightButton" onclick="joinLobbyMode()">
          Join lobby
        </button>

      </div>

    </div>

  </div>

  <!-- =========================
       ROOM PAGE
  ========================== -->

  <div class="page" id="roomPage">

    <div class="centerColumn">

		<h1>GAMEROOM</h1>

		<div class="roomCode" id="roomCode">
		ROOM
		</div>

        <ul id="playersList"></ul>

        <!-- CHAT -->
        <div id="chatContainer">

          <div id="chatMessages"></div>

          <div id="chatInputRow">

            <input id="chatInput" placeholder="Message...">

            <button id="sendChatButton" onclick="sendChat()">
              ↑
            </button>

          </div>
        </div>

        <!-- GAME SELECT -->
        <div id="gameSelect">
          <div class="gameOption selected" onclick="selectGame('undercover')">
            Undercover 🕵️
          </div>
        </div>

        <!-- BOTTOM BUTTON -->
        <button id="bottomButton"></button>

        <!-- LEAVE -->
        <button onclick="leaveLobby()">
          Leave lobby
        </button>

    </div>

  </div>

  <!-- =========================
       SOCKET.IO
  ========================== -->

  <script src="/socket.io/socket.io.js"></script>

  <script>

    const socket = io();

    let currentMode = null;
    let currentRoomId = null;
    let isReady = false;
    let selectedGame = "undercover";

    /* =========================
       RANDOM ROOM ID
    ========================== */

    function generateRoomId() {

      const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

      let result = "";

      for (let i = 0; i < 6; i++) {

        result += chars[
          Math.floor(Math.random() * chars.length)
        ];
      }

      return result;
    }

    /* =========================
       MODES
    ========================== */

    function createLobbyMode() {

      currentMode = "create";

      document.getElementById("roomInputContainer").innerHTML = `
        <input
          id="roomIdInput"
          value="${generateRoomId()}"
          maxlength="6"
        >
      `;

      document.getElementById("leftButton").textContent =
        "<- Back";

      document.getElementById("rightButton").textContent =
        "Create ->";

      document.getElementById("leftButton").onclick =
        resetMainPage;

      document.getElementById("rightButton").onclick =
        confirmCreateLobby;
    }

    function joinLobbyMode() {

      currentMode = "join";

      document.getElementById("roomInputContainer").innerHTML = `
        <input
          id="roomIdInput"
          placeholder="ROOM ID..."
          maxlength="6"
        >
      `;

      document.getElementById("leftButton").textContent =
        "<- Back";

      document.getElementById("rightButton").textContent =
        "Join ->";

      document.getElementById("leftButton").onclick =
        resetMainPage;

      document.getElementById("rightButton").onclick =
        confirmJoinLobby;
    }

    function leaveLobby() {

      socket.emit("leaveRoom");

      forceBackToMenu();
    }

    function resetMainPage() {

      currentMode = null;

      document.getElementById("roomInputContainer").innerHTML = "";

      document.getElementById("leftButton").textContent =
        "Create lobby";

      document.getElementById("rightButton").textContent =
        "Join lobby";

      document.getElementById("leftButton").onclick =
        createLobbyMode;

      document.getElementById("rightButton").onclick =
        joinLobbyMode;
    }

    /* =========================
       CREATE ROOM
    ========================== */

    function confirmCreateLobby() {

      const roomId =
        document.getElementById("roomIdInput").value;

      const name =
        document.getElementById("nameInput").value.trim()
        || "Host";

      currentRoomId = roomId;

      socket.emit("createRoom", {
        roomId,
        name,
        password: null
      });
    }

    /* =========================
       JOIN ROOM
    ========================== */

    function confirmJoinLobby() {

      const roomId =
        document.getElementById("roomIdInput").value;

      const name =
        document.getElementById("nameInput").value.trim()
        || "Player";

      currentRoomId = roomId;

      socket.emit("joinRoom", {
        roomId,
        name,
        password: null
      });
    }

    /* =========================
       LEAVE ROOM
    ========================== */
    socket.on("leftRoom", () => {

      forceBackToMenu();
    });

    socket.on("kickedFromRoom", () => {

      forceBackToMenu();
    });

    function forceBackToMenu() {

      document.getElementById("roomPage").style.display = "none";
      document.getElementById("mainPage").style.display = "flex";

      resetMainPage();

      currentRoomId = null;

      document.getElementById("playersList").innerHTML = "";
      document.getElementById("chatMessages").innerHTML = "";
    }

    /* =========================
       ROOM UPDATE
    ========================== */

    socket.on("roomUpdate", (room) => {

      window.lastRoom = room;

      document.getElementById("mainPage").style.display = "none";
      document.getElementById("roomPage").style.display = "flex";

      document.getElementById("roomCode").textContent = currentRoomId;

      // PLAYERS
      const playersList = document.getElementById("playersList");
      playersList.innerHTML = "";

      room.players.forEach(player => {

        const li = document.createElement("li");

        const isHost = room.host === player.id;

        const ready = player.ready ? " ✔" : "";

        li.textContent =
          (isHost ? "👑 " : "") +
          player.name +
          ready;

        playersList.appendChild(li);
      });

      // =========================
      // BOTTOM BUTTON LOGIC
      // =========================

      const mySocketId = socket.id;
      const me = room.players.find(p => p.id === mySocketId);

      const isHost = room.host === mySocketId;

      const allReady =
        room.players.length > 1 &&
        room.players.every(p => p.ready);

      const bottomBtn = document.getElementById("bottomButton");

      if (isHost) {

        bottomBtn.textContent = "JOUER";

        bottomBtn.onclick = () => {
          socket.emit("startGame", currentRoomId);
        };

        bottomBtn.className =
          allReady ? "" : "disabled";

      } else {

        bottomBtn.textContent =
          isReady ? "PRÊT ✔" : "PRET";

        bottomBtn.onclick = toggleReady;

        bottomBtn.className =
          isReady ? "readyOn" : "readyOff";
      }
    });

    /* =========================
       CHAT IN LOBBY
    ========================== */
	
	function sendChat() {

	  const input =
		document.getElementById("chatInput");

	  const msg = input.value.trim();

	  if (!msg) return;

	  const name =
		document.getElementById("nameInput").value.trim()
		|| "Player";

	  socket.emit("chat", {
		roomId: currentRoomId,
		name,
		msg
	  });

	  input.value = "";
	}
	
	socket.on("chat", ({ name, msg }) => {

	  const chatMessages =
		document.getElementById("chatMessages");

	  const div = document.createElement("div");

	  div.className = "chatMessage";

	  div.textContent = `${name}: ${msg}`;

	  chatMessages.appendChild(div);

	  chatMessages.scrollTop =
		chatMessages.scrollHeight;
	});


    /* =========================
       GAME SELECT
    ========================== */

    function selectGame(game) {

      const room = window.lastRoom;

      const mySocketId = socket.id;

      const me = room?.players?.find(p => p.id === mySocketId);

      if (!me) return;

      const isHost = room.host === mySocketId;

      if (!isHost) return;

      selectedGame = game;

      document.querySelectorAll(".gameOption")
        .forEach(el => el.classList.remove("selected"));

      event.target.classList.add("selected");

      socket.emit("selectGame", {
        roomId: currentRoomId,
        game
      });
    }

    /* =========================
       GAME READY
    ========================== */
    function toggleReady() {

      isReady = !isReady;

      socket.emit("setReady", {
        roomId: currentRoomId,
        ready: isReady
      });
    }

  </script>

</body>

</html>
